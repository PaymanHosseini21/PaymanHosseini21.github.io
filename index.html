<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background-color: white;
            border-radius: 50px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            padding: 20px 40px;

        }
        .profile-pic {

            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            margin-right: 30px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.15);
        }
        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .info {
            text-align: left;
        }
        .info h1 {
            margin: 0;
            font-size: 28px;
        }
        .info p {
            color: #666;
            margin: 5px 0 20px;
            font-size: 16px;
        }
        .social-icons a {
            color: #555;
            margin-right: 15px;
            font-size: 24px;
            text-decoration: none;
            transition: 0.3s;
        }
        .social-icons a:hover {
            color: #000;
        }
    </style>
</head>
